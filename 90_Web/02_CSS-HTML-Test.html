<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02 CSS HTML Test</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .main-container {
            border: 2px solid white;
            width: 800px;
            height: 650px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .header-bar {
            height: 120px;
            border-bottom: 3px solid #ffff00;
            background-color: rgba(255, 255, 0, 0.05);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-right: 20px;
            gap: 15px;
        }

        .small-square {
            width: 30px;
            height: 30px;
            border: 2px solid #ffff00;
        }

        .content-area {
            position: relative;
            flex-grow: 1;
        }

        .center-box {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 400px;
            height: 300px;
            border: 2px solid #add8e6;
        }

        .orange-inner {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100px;
            height: 100px;
            border: 2px solid #ffa500;
        }

        .fix-bottom-right {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 50px;
            height: 50px;
            border: 2px solid #d4a5ff;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header class="header-bar">
            <div class="small-square"></div>
            <div class="small-square"></div>
            <div class="small-square"></div>
        </header>
        <main class="content-area">
            <div class="center-box">
                <div class="orange-inner"></div>
            </div>
            <div class="fix-bottom-right"></div>
        </main>
    </div>
</body>
</html>
