<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Mercedes Header Test</title>
    <style>

        body { margin: 0; font-family: sans-serif; background-color: #333; }
        
        .mercedes-header {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            height: 80px;
        }

        .nav-left ul {
            list-style: none;
            display: flex;
            gap: 25px;
            padding: 0;
        }

        .nav-left a { color: #fff; text-decoration: none; font-size: 14px; }

        .logo img { height: 50px; display: block; }

        .nav-right { display: flex; align-items: center; gap: 20px; }

        .icons { display: flex; gap: 15px; font-size: 20px; }

        .login-area { display: flex; align-items: center; gap: 10px; }

        .login-text { display: flex; flex-direction: column; font-size: 12px; }
        
        .subtext { color: #888; font-size: 10px; }
    
.hero-section {
    position: relative;
    width: 100%;
    overflow: hidden;
    color: #ffffff;
}

.hero-image {
    width: 100%;
    height: auto;
    display: block;
    object-fit: cover;
}

.hero-content {
    position: absolute;
    top: 50%;                  
    left: 5%;                  
    transform: translateY(-50%); 
    max-width: 480px;          
    background: rgba(0, 0, 0, 0.2); 
    padding: 20px;
}

.hero-content h1 {
    font-size: 2.8rem;
    font-weight: 300;          
    line-height: 1.2;
    margin: 0 0 20px 0;
}

.hero-content p {
    font-size: 1rem;
    line-height: 1.5;
    margin: 0 0 30px 0;
    font-weight: 300;
    opacity: 0.9;
}

.btn-angebot {
    display: inline-block;
    background-color: #0062ff; 
    color: #ffffff;
    text-decoration: none;
    padding: 12px 32px;
    font-size: 0.95rem;
    font-weight: 500;
    border-radius: 2px;        
    transition: background-color 0.2s ease;
}

.btn-angebot:hover {
    background-color: #004ecc;
}

@media (max-width: 850px) {
    .hero-content {
        position: relative;
        top: 0;
        left: 0;
        transform: none;
        max-width: 100%;
        background-color: #111; 
        padding: 40px 20px;
    }
    .hero-content h1 {
        font-size: 2rem;
    }
}
    </style>
    </style>

</head>
<body>

    <header class="mercedes-header">
        <nav class="nav-left">
            <ul>
                <li><a href="#">Modelle</a></li>
                <li><a href="#">Kaufen</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Markenwelt</a></li>
            </ul>
        </nav>

        <div class="logo">
            <img src="https://assets.oneweb.mercedes-benz.com/plugin/hp-assets/latest/images/brands/mercedes-benz/logo.svg" alt="Mercedes Logo">
        </div>

        <div class="nav-right">
            <div class="icons">
                <span>§</span><span>🔍</span><span>🤍</span>
            </div>
            <div class="login-area">
                <span style="font-size: 24px;">👤</span>
                <div class="login-text">
                    <span class="subtext">Privatkunde</span>
                    <span>Anmelden</span>
                </div>
            </div>
        </div>
    </header>
    
    <section class="hero-section">
    <img src="https://www.mercedes-benz.at/content/dam/austria/passengercars/campaigns/taktik-q2-2026/Stage.jpg/1775558101146.jpg" alt="Mercedes-Benz GLB" class="hero-image">
    
    <div class="hero-content">
        <h1>Vorne Business.<br>Hinten Party.</h1>
        <p>Einer für alles: der elektrische GLB oder der elektrische CLA Shooting Brake. Jetzt einsteigen zum attraktiven Aktionszins ab 2,99 %.</p>
        <a href="#" class="btn-angebot">Angebot sichern</a>
    </div>
</section>

</body>
</html>
